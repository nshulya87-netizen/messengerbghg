<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Мессенджер</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <h2>🚀 Неоновый Чат</h2>
        
        <!-- Вывод ошибок (если пароль неверный или имя занято) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/auth" method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Имя пользователя" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            
            <div class="buttons-row">
                <button type="submit" name="action" value="login" class="btn btn-login">Войти</button>
                <button type="submit" name="action" value="register" class="btn btn-reg">Регистрация</button>
            </div>
        </form>
    </div>
</body>
</html>
